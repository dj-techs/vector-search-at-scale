name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a newer push lands on the same ref. Cuts
# wall time on rapid push-on-push by ~30-60s of wasted CI quota.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"
          terraform_wrapper: false
      - name: terraform fmt -check -recursive
        run: terraform fmt -check -recursive terraform

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"
          terraform_wrapper: false
      - name: terraform validate (every module + env)
        run: |
          set -euo pipefail
          for dir in terraform/modules/* terraform/envs/* ; do
            echo "==> $dir"
            (
              cd "$dir"
              terraform init -backend=false -input=false >/dev/null
              terraform validate
            )
          done

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # The .tftpl user-data scripts contain ${var} interpolations from terraform's
          # templatefile(); shellcheck doesn't know about those, so lint the static .sh
          # files only and rely on `terraform validate` to catch templatefile errors.
          shellcheck terraform/scripts/*.sh

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install dev extras
        run: pip install -e '.[dev]'
      - name: ruff lint
        run: ruff check src/ tests/
      - name: pytest
        run: pytest

  memory-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Verify MEMORY directory exists and has required files
        run: |
          test -f MEMORY/full_history_ai.md
          test -f MEMORY/full_history_human.md
          test -f MEMORY/core_decisions_ai.md
          test -f MEMORY/core_decisions_human.md
      - name: Verify D-001 baseline decision exists
        run: |
          grep -q "id: D-001" MEMORY/core_decisions_ai.md
